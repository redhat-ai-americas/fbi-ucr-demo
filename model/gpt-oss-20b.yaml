---
apiVersion: v1
kind: Namespace
metadata:
  name: gpt-oss-model
  labels:
    opendatahub.io/dashboard: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gpt-oss-model-cache
  namespace: gpt-oss-model
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
# gpt-oss-20b supports OpenAI-compatible tool_calls in inference responses,
# making it suitable for agentic and MCP workflows that require tool calling.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt-oss-20b
  namespace: gpt-oss-model
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gpt-oss-20b
  template:
    metadata:
      labels:
        app: gpt-oss-20b
    spec:
      containers:
        - name: vllm
          image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3
          command:
            - vllm
            - serve
          args:
            - RedHatAI/gpt-oss-20b
            - --port
            - "8000"
            - --dtype
            - bfloat16
            - --max-model-len
            - "131072"
            - --kv-cache-dtype
            - fp8_e4m3
            - --gpu-memory-utilization
            - "0.95"
            - --max-num-seqs
            - "8"
            - --enforce-eager
            - --enable-auto-tool-choice
            - --tool-call-parser
            - openai
            - --enable-prefix-caching
            - --enable-prompt-tokens-details
            - --enable-server-load-tracking
          env:
            - name: HOME
              value: /tmp/home
            - name: HF_HOME
              value: /models/huggingface
            - name: TRANSFORMERS_CACHE
              value: /models/huggingface
            - name: VLLM_CACHE_DIR
              value: /models/vllm-cache
            - name: XDG_CACHE_HOME
              value: /tmp/cache
            - name: HF_HUB_OFFLINE
              value: "0"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 15
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
            - name: tmp-cache
              mountPath: /tmp/cache
            - name: tmp-home
              mountPath: /tmp/home
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 100Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        - name: tmp-cache
          emptyDir: {}
        - name: tmp-home
          emptyDir: {}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: gpt-oss-20b
  namespace: gpt-oss-model
  labels:
    app: gpt-oss-20b
spec:
  selector:
    app: gpt-oss-20b
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gpt-oss-20b
  namespace: gpt-oss-model
spec:
  to:
    kind: Service
    name: gpt-oss-20b
  port:
    targetPort: 8000
  tls:
    termination: edge
